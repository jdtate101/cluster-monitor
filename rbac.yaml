---
# RBAC for k8s-pod-monitor
# Apply this to EACH cluster with the appropriate context:
#
#   kubectl apply -f rbac.yaml --context openshift
#   kubectl apply -f rbac.yaml --context rke2-prod
#   kubectl apply -f rbac.yaml --context k3s
#
# Then extract the token (see README.md for commands).
# -----------------------------------------------------------------------

apiVersion: v1
kind: Namespace
metadata:
  name: pod-monitor
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-monitor
  namespace: pod-monitor
---
# ClusterRole: read-only access to pods across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-monitor-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-monitor-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-monitor-reader
subjects:
  - kind: ServiceAccount
    name: pod-monitor
    namespace: pod-monitor
---
# Long-lived token secret (k8s 1.24+)
apiVersion: v1
kind: Secret
metadata:
  name: pod-monitor-token
  namespace: pod-monitor
  annotations:
    kubernetes.io/service-account.name: pod-monitor
type: kubernetes.io/service-account-token
